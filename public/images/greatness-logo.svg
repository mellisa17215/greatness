<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-labelledby="title desc">
  <title id="title">Greatness — Summer 2026</title>
  <desc id="desc">A summer logo with a golden sun, teal wave, and the wordmark Greatness.</desc>

  <defs>
    <linearGradient id="sunGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#FFE08A"/>
      <stop offset="1" stop-color="#FFD166"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0" x2="1">
      <stop offset="0" stop-color="#0EA5B6"/>
      <stop offset="1" stop-color="#118AB2"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/></feMerge>
    </filter>
  </defs>

  <g transform="translate(120,110)">
    <circle cx="0" cy="0" r="48" fill="url(#sunGrad)"/>
    <g stroke="#FFD166" stroke-width="6" stroke-linecap="round" opacity="0.95">
      <line x1="-86" y1="0" x2="-120" y2="0"/>
      <line x1="86" y1="0" x2="120" y2="0"/>
      <line x1="0" y1="-86" x2="0" y2="-120"/>
      <line x1="0" y1="86" x2="0" y2="120"/>
      <line x1="-60" y1="-60" x2="-90" y2="-90"/>
      <line x1="60" y1="-60" x2="90" y2="-90"/>
      <line x1="-60" y1="60" x2="-90" y2="90"/>
      <line x1="60" y1="60" x2="90" y2="90"/>
    </g>
  </g>

  <path d="M220 190 C 320 130, 420 130, 520 190 C 620 250, 720 250, 820 190 L 820 220 L 220 220 Z"
        fill="url(#waveGrad)" opacity="0.95" filter="url(#soft)"/>

  <text x="360" y="135" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial"
        font-weight="700" font-size="72" fill="#213547" letter-spacing="-1">
    Greatness
  </text>

  <text x="360" y="175" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial"
        font-size="18" fill="#213547" opacity="0.85">
    Summer 2026 — Light & Breezy
  </text>
</svg>
